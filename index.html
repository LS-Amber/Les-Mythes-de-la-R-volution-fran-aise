<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>风暴中的一生 · 法国大革命人生模拟</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- ============ 标题界面 ============ -->
    <section id="screen-title" class="screen active">
      <div class="title-wrap">
        <div class="title-eyebrow">1769 — 1815</div>
        <h1 class="game-title">风暴中的一生</h1>
        <div class="title-sub">一部法国大革命的个人史诗</div>
        <p class="title-blurb">
          你将出生于 1769 年的法国。在三级会议的喧嚣、巴士底狱的硝烟、断头台的阴影与帝国的鹰旗之间,
          每一次抉择都将塑造你的性格、立场与最终的归宿。
        </p>
        <button class="btn btn-primary" onclick="goToScreen('screen-select')">开始你的人生</button>
        <div class="title-foot">v0.1 · 童年期 / 少年期 试玩版</div>
      </div>
    </section>

    <!-- ============ 身份选择界面 ============ -->
    <section id="screen-select" class="screen">
      <div class="select-wrap">
        <h2 class="screen-title">你是谁?</h2>
        <p class="screen-hint">本次试玩仅开放「书记官之子 · 省城 · 男性」一条角色线,其余选项已规划但尚未撰写。</p>

        <div class="select-block">
          <div class="select-label">出身</div>
          <div class="select-grid" id="origin-grid"></div>
        </div>

        <div class="select-block">
          <div class="select-label">家乡</div>
          <div class="select-grid" id="region-grid"></div>
        </div>

        <div class="select-block">
          <div class="select-label">性别</div>
          <div class="select-grid" id="gender-grid"></div>
        </div>

        <div class="select-actions">
          <button class="btn" onclick="goToScreen('screen-title')">返回</button>
          <button class="btn btn-primary" id="btn-start-life" onclick="startLife()">踏入人生</button>
        </div>
      </div>
    </section>

    <!-- ============ 游戏主界面 ============ -->
    <section id="screen-game" class="screen">
      <header class="game-header">
        <div class="header-left">
          <div class="header-title">风暴中的一生</div>
          <div class="header-phase" id="phase-display">童年期(1769 — 1783)</div>
        </div>
        <div class="header-right">
          <button class="btn btn-ghost" onclick="toggleSidebar()">角色 ▾</button>
        </div>
      </header>

      <main class="game-main">
        <!-- 事件区 -->
        <div class="event-column">
          <div id="event-container" class="event-card"></div>
        </div>

        <!-- 角色面板 -->
        <aside id="character-panel" class="character-panel"></aside>
      </main>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
